name: Bug report
description: Report a reproducible OpenRelief issue using synthetic data only.
title: "[Bug]: "
labels: ["V1"]
body:
  - type: markdown
    attributes:
      value: "No real survivor PII. Use synthetic examples, fake letters, or redacted screenshots only."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use synthetic data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety or privacy impact
      description: Note if this involves uploaded files, local storage, citations, escalation, or exports.
    validations:
      required: true
