name: Policy source update
description: Propose a policy source, citation, or metadata change.
title: "[Policy source]: "
labels: ["policy-source", "V1"]
body:
  - type: markdown
    attributes:
      value: "No real survivor PII. Policy changes need official or verified sources."
  - type: input
    id: source-url
    attributes:
      label: source URL
      description: Official source URL.
    validations:
      required: true
  - type: input
    id: publisher
    attributes:
      label: Publisher
      description: "Example: FEMA, SBA, California agency, legal aid org."
    validations:
      required: true
  - type: input
    id: retrieved-at
    attributes:
      label: Retrieved date
      description: YYYY-MM-DD.
    validations:
      required: true
  - type: textarea
    id: policy-change
    attributes:
      label: Policy change
      description: What rule, checklist item, source metadata, or citation should change?
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests needed
      description: Which policy validation, eval, or workflow test should cover this?
    validations:
      required: true
