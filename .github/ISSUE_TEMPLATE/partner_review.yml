name: Partner review
description: Track sanitized partner review for V1 launch readiness.
title: "[Partner review]: "
labels: ["partner-review", "safety", "V1"]
body:
  - type: markdown
    attributes:
      value: "No real survivor PII. Use synthetic examples only. Keep raw notes and consent records outside public issues."
  - type: input
    id: review-id
    attributes:
      label: review_id
      description: Sanitized review session ID for docs/partner-review-log.md.
    validations:
      required: true
  - type: input
    id: review-date
    attributes:
      label: review_date
      description: YYYY-MM-DD.
    validations:
      required: true
  - type: input
    id: reviewer-role
    attributes:
      label: Reviewer role
      description: "Example: legal aid reviewer, disaster case worker, accessibility reviewer."
    validations:
      required: true
  - type: input
    id: organization-type
    attributes:
      label: reviewer organization type
      description: "Example: nonprofit legal aid, civic technology group, emergency management volunteer group."
    validations:
      required: true
  - type: input
    id: consent-record
    attributes:
      label: Consent record
      description: Sanitized consent reference only. Do not include names, emails, phone numbers, signatures, or private links.
    validations:
      required: true
  - type: textarea
    id: materials-reviewed
    attributes:
      label: Materials reviewed
      description: Confirm each reviewed material stays synthetic and public-safe.
      value: |
        - hosted synthetic sandbox: https://saivedant169.github.io/OpenRelief/
        - docs/demo-script.md
        - docs/demo-video-runbook.md
        - docs/partner-review-packet.md
        - docs/baseline-failure-examples.md
        - packages/evals/reports/california-wildfire-v1.json
        - examples/california-wildfire/letters/denial-occupancy-proof.txt
    validations:
      required: true
  - type: input
    id: note-storage-location
    attributes:
      label: note storage location
      description: Sanitized private-note storage reference only. Do not include private links or access details.
    validations:
      required: true
  - type: dropdown
    id: sanitization-status
    attributes:
      label: sanitization status
      description: Public issues must use sanitized before launch evidence is copied.
      options:
        - sanitized
        - private-only
        - needs-redaction
    validations:
      required: true
  - type: textarea
    id: workflow-match-answer
    attributes:
      label: workflow_match_answer
      description: Does workflow match real disaster letter review? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: misleading-output-answer
    attributes:
      label: misleading_output_answer
      description: Which output could mislead a survivor under stress? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: risk-escalation-answer
    attributes:
      label: risk_escalation_answer
      description: Which risk flag needs faster human escalation? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: evidence-gap-answer
    attributes:
      label: evidence_gap_answer
      description: Which evidence category is missing or overbroad? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: citation-gap-answer
    attributes:
      label: citation_gap_answer
      description: Which source or policy claim needs stronger citation? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: remove-before-launch-answer
    attributes:
      label: remove_before_launch_answer
      description: Which screen or wording should be removed before launch? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: sanitized-findings
    attributes:
      label: Sanitized findings
      description: Summarize workflow, safety, citation, escalation, privacy, or accessibility findings without private data.
    validations:
      required: true
  - type: dropdown
    id: launch-risk
    attributes:
      label: Launch risk
      description: Highest unresolved risk found during review.
      options:
        - critical
        - high
        - medium
        - low
        - none
    validations:
      required: true
  - type: dropdown
    id: critical-issues-open
    attributes:
      label: critical_issues_open
      description: Public launch stays blocked unless this is no.
      options:
        - yes
        - no
    validations:
      required: true
  - type: dropdown
    id: high-issues-open
    attributes:
      label: high_issues_open
      description: Use accepted, closed, none, or no only when high issues are resolved for launch.
      options:
        - yes
        - accepted
        - closed
        - none
        - no
    validations:
      required: true
  - type: dropdown
    id: manual-safety-review-complete
    attributes:
      label: manual_safety_review_complete
      description: Must be yes before launch evidence is copied.
      options:
        - no
        - yes
    validations:
      required: true
  - type: dropdown
    id: ready-for-public-demo
    attributes:
      label: ready_for_public_demo
      description: Must be yes only after sanitized review evidence is complete.
      options:
        - no
        - yes
    validations:
      required: true
  - type: input
    id: decision-owner
    attributes:
      label: decision_owner
      description: Must be Saivedant Hava before launch evidence is copied.
    validations:
      required: true
  - type: input
    id: decision-date
    attributes:
      label: decision_date
      description: YYYY-MM-DD. Must not be before review_date.
    validations:
      required: true
  - type: textarea
    id: launch-notes
    attributes:
      label: notes
      description: Sanitized launch decision notes for docs/partner-review-log.md.
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Safety confirmation
      options:
        - label: Raw notes, consent records, names, addresses, phone numbers, emails, SSNs, agency IDs, insurance details, medical details, immigration details, screenshots, and partner private data are not included.
          required: true
        - label: Findings use synthetic examples only.
          required: true
        - label: Sanitized outcome can be copied into docs/partner-review-log.md.
          required: true
        - label: Public issue URL can be copied into the public tracking issue field.
          required: true
