name: Partner review
description: Track sanitized partner review for V1 launch readiness.
title: "[Partner review]: "
labels: ["partner-review", "safety", "V1"]
body:
  - type: markdown
    attributes:
      value: "No real survivor PII. Use synthetic examples only. Keep raw notes and consent records outside public issues."
  - type: input
    id: reviewer-role
    attributes:
      label: Reviewer role
      description: Example: legal aid reviewer, disaster case worker, accessibility reviewer.
    validations:
      required: true
  - type: input
    id: organization-type
    attributes:
      label: Organization type
      description: Example: nonprofit legal aid, civic technology group, emergency management volunteer group.
    validations:
      required: true
  - type: textarea
    id: materials-reviewed
    attributes:
      label: Materials reviewed
      description: List synthetic sandbox, demo script, demo video runbook, baseline failures, eval report, and synthetic examples reviewed.
    validations:
      required: true
  - type: textarea
    id: workflow-match-answer
    attributes:
      label: workflow_match_answer
      description: Does workflow match real disaster letter review? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: misleading-output-answer
    attributes:
      label: misleading_output_answer
      description: Which output could mislead a survivor under stress? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: risk-escalation-answer
    attributes:
      label: risk_escalation_answer
      description: Which risk flag needs faster human escalation? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: evidence-gap-answer
    attributes:
      label: evidence_gap_answer
      description: Which evidence category is missing or overbroad? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: citation-gap-answer
    attributes:
      label: citation_gap_answer
      description: Which source or policy claim needs stronger citation? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: remove-before-launch-answer
    attributes:
      label: remove_before_launch_answer
      description: Which screen or wording should be removed before launch? Sanitized answer only.
    validations:
      required: true
  - type: textarea
    id: sanitized-findings
    attributes:
      label: Sanitized findings
      description: Summarize workflow, safety, citation, escalation, privacy, or accessibility findings without private data.
    validations:
      required: true
  - type: dropdown
    id: launch-risk
    attributes:
      label: Launch risk
      description: Highest unresolved risk found during review.
      options:
        - critical
        - high
        - medium
        - low
        - none
    validations:
      required: true
  - type: checkboxes
    id: safety-confirmation
    attributes:
      label: Safety confirmation
      options:
        - label: Raw notes, consent records, names, addresses, phone numbers, emails, agency IDs, insurance details, medical details, and immigration details are not included.
          required: true
        - label: Findings use synthetic examples only.
          required: true
        - label: Sanitized outcome can be copied into docs/partner-review-log.md.
          required: true
        - label: Public issue URL can be copied into the public tracking issue field.
          required: true
